<!DOCTYPE html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página inicial moderna e responsiva">
    <meta name="author" content="Credinowe">
    <title>Bem-vindo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 50px 40px;
        max-width: 600px;
        width: 100%;
        text-align: center;
        animation: fadeIn 0.8s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        color: #333;
        font-size: 2.5rem;
        margin-bottom: 15px;
        font-weight: 700;
      }

      .subtitle {
        color: #666;
        font-size: 1.1rem;
        margin-bottom: 30px;
        line-height: 1.6;
      }

      .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 20px;
        margin: 40px 0;
      }

      .feature {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 25px 15px;
        border-radius: 15px;
        color: white;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer;
      }

      .feature:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
      }

      .feature-icon {
        font-size: 2rem;
        margin-bottom: 10px;
      }

      .feature-title {
        font-weight: 600;
        font-size: 1.1rem;
      }

      .cta-button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 40px;
        font-size: 1.1rem;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 600;
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        margin-top: 20px;
      }

      .cta-button:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
      }

      .cta-button:active {
        transform: scale(0.98);
      }

      footer {
        margin-top: 40px;
        color: #999;
        font-size: 0.9rem;
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 2rem;
        }

        .container {
          padding: 40px 25px;
        }

        .features {
          grid-template-columns: 1fr;
          gap: 15px;
        }
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 1.7rem;
        }

        .subtitle {
          font-size: 1rem;
        }

        .container {
          padding: 30px 20px;
        }
      }
    </style>
    <script type="text/javascript" src="./index.js" defer=""></script>
    <link rel="stylesheet" href="./index.css">
  </head>

  <body>
    <div class="container">
      <h1>Bem-vindo! 👋</h1>
      <p class="subtitle">
        Uma página moderna, responsiva e totalmente segura,
        pronta para ser o ponto de partida do seu projeto.
      </p>

      <div class="features">
        <div class="feature">
          <div class="feature-icon">🚀</div>
          <div class="feature-title">Rápido</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🔒</div>
          <div class="feature-title">Seguro</div>
        </div>
        <div class="feature">
          <div class="feature-icon">📱</div>
          <div class="feature-title">Responsivo</div>
        </div>
      </div>

      <button class="cta-button" onclick="handleClick()">
        Começar Agora
      </button>

      <footer>
        © 2024 Credinowe. Todos os direitos reservados.
      </footer>
    </div>

    <script>
      function handleClick() {
        alert('Botão clicado! Adicione sua funcionalidade aqui.');
        // Adicione sua lógica personalizada aqui
      }

      // Adicionar efeito de parallax suave no scroll
      document.addEventListener('mousemove', function(e) {
        const container = document.querySelector('.container');
        const x = (e.clientX / window.innerWidth - 0.5) * 10;
        const y = (e.clientY / window.innerHeight - 0.5) * 10;
        container.style.transform = `perspective(1000px) rotateY(${x}deg) rotateX(${-y}deg)`;
      });
    </script>

  </body>

</html>
